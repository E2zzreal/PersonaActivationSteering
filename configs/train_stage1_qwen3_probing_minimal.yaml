# PersonaSteer Stage 1 训练配置 - Qwen3-4B (Probing精简版)
# 方案A - 只选峰值层，层数最少
#
# 优点: 减少25%计算量 (8→6层)
# 缺点: 缺少冗余，可能不够稳定
# 适用: 资源受限、快速实验

# 模型配置
model:
  # 方案A - 精简高效 (6层)
  # 每个特质只选峰值层
  inject_layers: [0, 3, 10, 11, 15, 28]
  v_dim: 1024
  hidden_dim: 4096
  layer_dim: 2560
  v_norm_clip: null
  v_norm_weight: 0.01
  v_norm_target: 32.0
  num_inject_layers: 6  # 最精简
  use_layer_embedding: true

# 模型路径
base_model: /home/kemove/Desktop/PersonaSteer/Qwen/Qwen3-4B

# 数据配置
data:
  tokenizer: /home/kemove/Desktop/PersonaSteer/Qwen/Qwen3-4B
  train_path: data/split/train.jsonl
  eval_path: data/split/val.jsonl
  max_turns: 6
  batch_size: 1
  num_workers: 2

# 训练配置
training:
  stage: 1
  num_epochs: 4
  learning_rate: 0.0001
  weight_decay: 0.01
  max_grad_norm: 1.0
  sft_weight: 1.0
  scl_weight: 0.0
  temperature: 0.07
  warmup_steps: 100
  use_amp: true
  output_dir: checkpoints/stage1_qwen3_probing_minimal
  save_interval: 1
  log_interval: 10
  use_dual_loss: false
  injected_loss_weight: 0.5

# 设备配置
device: cuda:1
seed: 42
debug: false