# PersonaSteer Stage 3 自动训练配置
# 基于最佳实验 gate_reg_0.01_lr3e5

# 模型配置
model:
  inject_layers: [8, 9, 10, 11, 12, 13, 14, 15]
  v_dim: 1024
  hidden_dim: 4096
  layer_dim: 2560
  v_norm_weight: 0.01
  v_norm_target: 32.0
  num_inject_layers: 8
  use_layer_embedding: true

# 模型路径
base_model: /home/kemove/Desktop/PersonaSteer/Qwen/Qwen3-4B

# Stage 2 checkpoint (最佳实验)
stage2_checkpoint: checkpoints/exp_gate_reg_0.01_lr3e5/best.pt

# 数据配置
data:
  tokenizer: /home/kemove/Desktop/PersonaSteer/Qwen/Qwen3-4B
  train_path: data/split/train.jsonl
  eval_path: data/split/val.jsonl
  max_turns: 6
  batch_size: 1
  num_workers: 2

# 训练配置
training:
  stage: 3
  num_epochs: 3
  learning_rate: 0.00003
  weight_decay: 0.01
  max_grad_norm: 1.0

  # 损失权重
  sft_weight: 1.0
  scl_weight: 0.1
  temperature: 0.07

  # Gate配置 (继承最佳实验)
  gate_min_value: 0.0
  gate_reg_weight: 0.01
  gate_max: 1.0
  gate_init_bias: -2.0

  # v_norm约束
  v_norm_weight: 0.1
  v_norm_target: 5.0

  # 优化器
  warmup_steps: 50

  # 混合精度
  use_amp: true

  # Checkpoint保存
  output_dir: checkpoints/stage3_auto
  save_interval: 1

  # 日志
  log_interval: 10

  # 双loss训练配置
  use_dual_loss: false

# 设备配置
device: cuda:0
seed: 42
debug: false
