# Stage 3 配置 - 基于gate_init_0 (排名第2)

model:
  inject_layers: [8, 9, 10, 11, 12, 13, 14, 15]
  v_dim: 1024
  hidden_dim: 4096
  layer_dim: 2560
  v_norm_weight: 0.01
  v_norm_target: 32.0
  num_inject_layers: 8
  use_layer_embedding: true

base_model: /home/kemove/Desktop/PersonaSteer/Qwen/Qwen3-4B
stage2_checkpoint: checkpoints/exp_gate_init_0/best.pt

data:
  tokenizer: /home/kemove/Desktop/PersonaSteer/Qwen/Qwen3-4B
  train_path: data/split/train.jsonl
  eval_path: data/split/val.jsonl
  max_turns: 6
  batch_size: 1
  num_workers: 2

training:
  stage: 3
  num_epochs: 3
  learning_rate: 0.00003
  weight_decay: 0.01
  max_grad_norm: 1.0
  sft_weight: 1.0
  scl_weight: 0.1
  temperature: 0.07
  gate_min_value: 0.0
  gate_reg_weight: 0.01
  gate_max: 1.0
  gate_init_bias: 0.0
  v_norm_weight: 0.1
  v_norm_target: 5.0
  warmup_steps: 50
  use_amp: true
  output_dir: checkpoints/stage3_gate_init_0
  save_interval: 1
  log_interval: 10
  use_dual_loss: false

device: cuda:1
seed: 42
debug: false
